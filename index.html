<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TempO station settings</title>

<style>
  body {
    font-family: -apple-system, sans-serif;
    max-width: 400px;
    margin: 0 auto;
    padding: 20px;
    background: #f5f5f0;
  }
  h1 {
    font-size: 20px;
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 14px;
    color: #555;
    margin-top: 16px;
    margin-bottom: 4px;
  }
  input {
    width: 100%;
    padding: 10px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 8px;
    box-sizing: border-box;
  }
  button {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    font-weight: 500;
    margin-top: 24px;
    border: none;
    border-radius: 8px;
    background: #2e7d32;
    color: white;
    cursor: pointer;
  }
  button:active {
    opacity: 0.85;
  }
  #status {
    margin-top: 16px;
    font-size: 14px;
    color: #2e7d32;
    text-align: center;
    display: none;
  }
</style>
</head>
<body>

<h1>TempO station settings</h1>


<input type="text" id="compName" placeholder="напр. Чемпіонат України 2026">


<input type="date" id="compDate">


<input type="number" id="stationNum" min="1" placeholder="напр. 2">


<input type="number" id="taskCount" min="1" max="10" placeholder="напр. 5">

<button id="saveBtn">Зберегти</button>

<div id="status">✓ налаштування збережено</div>

<script>

</script>

</body>
</html>
