<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TempO - answers export</title>
<style>
  body {
    font-family: -apple-system, sans-serif;
    max-width: 400px;
    margin: 0 auto;
    padding: 20px;
    background:  hsl(222, 100%, 92%);
  }
  h1 { font-size: 18px; margin-bottom: 4px; }
  #stationInfo { font-size: 13px; color: #666; margin-bottom: 20px; }

  #recordsList {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }
  .record-card {
    background: white;
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
  }
  .record-card .athlete {
    font-weight: 500;
    margin-bottom: 4px;
  }
  .record-card .details {
    color: #666;
    font-size: 13px;
  }

  #emptyMsg {
    text-align: center;
    color: #999;
    font-size: 14px;
    margin: 40px 0;
  }

  button {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    font-weight: 500;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 10px;
  }
  #exportBtn {
    background: #2e7d32;
    color: white;
  }
  #clearBtn {
    background: #ffebee;
    color: #c62828;
  }
</style>
</head>
<body>

<h1>Answers export</h1>
<div id="stationInfo">Loading...</div>

<div id="recordsList"></div>
<div id="emptyMsg" style="display:none;">No entries yet</div>

<button id="exportBtn">⬇ Download CSV</button>
<button id="clearBtn">🗑 Clear all entries</button>

<script>
  // -------------------------------------------------------------
  // КРОК 1. Підвантажуємо конфігурацію і записи з localStorage
  // -------------------------------------------------------------
  const config = JSON.parse(localStorage.getItem("tempoConfig"));

  if (!config) {
    alert("Спочатку заповни налаштування (Екран 1)");
  } else {
    document.getElementById("stationInfo").textContent =
      `Станція ${config.stationNumber} · ${config.competitionName} · ${config.competitionDate}`;
  }

  // -------------------------------------------------------------
  // КРОК 2. Відображення збережених записів.
  // Проходимо по масиву records і для кожного створюємо картку.
  // -------------------------------------------------------------
  function renderRecords() {
    const records = JSON.parse(localStorage.getItem("tempoRecords") || "[]");
    const list = document.getElementById("recordsList");
    const emptyMsg = document.getElementById("emptyMsg");

    list.innerHTML = "";

    if (records.length === 0) {
      emptyMsg.style.display = "block";
      return;
    }

    emptyMsg.style.display = "none";

    records.forEach(function(record, i) {
      const card = document.createElement("div");
      card.className = "record-card";

      // форматуємо час: секунди → MM:SS
      const m = Math.floor(record.stationTime / 60).toString().padStart(2, "0");
      const s = (record.stationTime % 60).toString().padStart(2, "0");
      const timeStr = `${m}:${s}`;

      // відповіді — об'єднуємо в рядок через пробіл
      // join() — склеює елементи в один рядок
      // ['A', 'B', 'C'].join(' · ') → 'A · B · C'
      const answersStr = record.answers.join(" · ");

      card.innerHTML = `
        <div class="athlete">${i + 1}. ${record.athleteName}</div>
        <div class="details">Time: ${timeStr} · Answers: ${answersStr}</div>
      `;

      list.appendChild(card);
    });
  }

  renderRecords();

  // -------------------------------------------------------------
  // КРОК 3. Генерація і скачування CSV.
  // CSV — складаємо його як рядок, потім "обманюємо" браузер:
  // створюємо тимчасове посилання <a href="..."> і клікаємо по
  // ньому програмно — браузер думає що клікнули на посилання
  // для скачування і завантажує файл.
  // -------------------------------------------------------------
 document.getElementById("exportBtn").addEventListener("click", function () {
    const records = JSON.parse(localStorage.getItem("tempoRecords") || "[]");

    if (records.length === 0) {
      alert("Немає записів для експорту");
      return;
    }

    // Заголовок CSV — перший рядок файлу
    // Кількість колонок для відповідей залежить від налаштувань
    const taskCount = parseInt(config.taskCount);
    const answerHeaders = [];
    for (let i = 1; i <= taskCount; i++) {
      answerHeaders.push(`Завдання_${i}`);
    }
    // join(',') — склеює масив в рядок через кому (стандарт CSV)
    const header = ["Станція", "Спортсмен", "Час_сек", ...answerHeaders].join(",");

    // Рядки даних — один рядок на кожен запис
    const rows = records.map(function(record) {
      return [
        record.stationNumber,
        record.athleteName,
        record.stationTime,
        ...record.answers.map(a => a || "")  // null замінюємо на пустий рядок
      ].join(",");
    });

    // Складаємо весь файл: заголовок + рядки, розділені переносом рядка
    const csvContent = [header, ...rows].join("\n");

    // Трюк зі скачуванням:
    // Blob — це "шматок даних в пам'яті браузера" (тут — наш CSV-текст)
    const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob); // створюємо тимчасове посилання на Blob

    const link = document.createElement("a");
    link.href = url;
    link.download = `station_${config.stationNumber}_${config.competitionDate}.csv`;
    link.click(); // програмний клік — запускає скачування

    URL.revokeObjectURL(url); // прибираємо тимчасове посилання з пам'яті
  });

  // -------------------------------------------------------------
  // КРОК 4. Очищення всіх записів (з підтвердженням).
  // -------------------------------------------------------------


</script>

</body>
</html>
